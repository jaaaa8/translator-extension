<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: "Segoe UI", sans-serif; width: 220px; padding: 10px; }
      label { display: block; margin: 8px 0 2px; font-size: 12px; color: #555; }
      select { width: 100%; }
      #status { margin-top: 10px; font-size: 12px; }
      .row { display: flex; align-items: center; gap: 6px; }
    </style>
  </head>
  <body>
    <div class="row">
      <input type="checkbox" id="enabled" />
      <b>Bật dịch</b>
    </div>
    <label for="srcLang">Ngôn ngữ nguồn</label>
    <select id="srcLang">
      <option value="ja">Tiếng Nhật</option>
      <option value="es">Tiếng Tây Ban Nha</option>
    </select>
    <label for="dstLang">Ngôn ngữ đích</label>
    <select id="dstLang">
      <option value="vi">Tiếng Việt</option>
      <option value="en">Tiếng Anh</option>
    </select>
    <button id="go" style="width: 100%; margin-top: 12px; padding: 8px; font-weight: bold; cursor: pointer">
      Dịch trang này
    </button>
    <div id="result" style="margin-top: 6px; font-size: 12px; color: #555"></div>
    <div id="status">● đang kiểm tra server…</div>
    <script src="popup.js"></script>
  </body>
</html>
